<style> 
body {
    background-image: url("lol.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: "Barlow Condensed", sans-serif;
    font-weight: 20px;
    font-style: normal;
    min-height: 100vh;
}

/* prevent weird spacing */
html, body {
    margin: 0;
    padding: 0;
}

.main {
    display: flex;
    justify-content: center;
    margin-top: 100px;
    background-color: rgba(0, 0, 91, 0.479);
    padding: 30px;
    width: 90%;
    max-width: 650px;
    margin-left: auto;
    margin-right: auto;
    backdrop-filter: blur(0.7px);
    border-radius: 50px;
}

.text {
    text-align: center;
    margin: 20px;
    color: white;
    padding: 15px;
}

.p1 {
    width: 100%;
    margin: auto;
    color: rgb(255, 255, 255);
    padding: 10px;
    font-size: 20px;

    /* FIXED overflow */
    white-space: normal;
    word-wrap: break-word;

    text-shadow:  0 0 10px rgb(65, 77, 253),
                  0 0 10px rgb(65, 77, 253),
                  0 0 10px rgb(65, 77, 253);
}

.icons {
    display: flex;
    justify-content: center;
    margin-top: 7px;
}

.p2 {
    font-size: 23px;
    font-family: "Caveat", cursive;
    margin-top: 20px;
    text-shadow: 0 0 10px rgb(54, 165, 255),
                 0 0 10px rgb(54, 165, 255);
}

.icons i {
    width: 10px;
    margin: 15px;
    font-size: 25px;
    color: rgb(176, 235, 255);
    text-shadow: 0 0 8px rgb(54, 165, 255);
    margin-top: 0;
    transition: 0.3s;
}

.icons i:hover {
    color: rgb(255, 100, 255);
}

.text h1 {
    color: rgb(176, 235, 255);
    font-size: 50px;
    text-shadow: 0 0 10px rgb(54, 165, 255);
}

/* MOBILE FIX */
@media (max-width: 600px) {
    .main {
        margin-top: 50px;
        padding: 20px;
        border-radius: 30px;
    }

    .text h1 {
        font-size: 32px;
    }

    .p1 {
        font-size: 16px;
    }

    .p2 {
        font-size: 18px;
    }

    .icons i {
        font-size: 22px;
        margin: 10px;
    }
}
</style>

<body>
